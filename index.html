<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActiOn</title>
</head>
<body>
    <h1>ActiOn - Bracket Competition</h1>

    <div id="input-section">
        <h2>Masukkan Nama Tim/Pemain</h2>
        <div>
            <label for="team-count">Jumlah Tim: </label>
            <select id="team-count">
                <option value="4">4 Tim</option>
                <option value="8" selected>8 Tim</option>
                <option value="16">16 Tim</option>
            </select>
        </div>
        <div id="team-inputs"></div>
        <p id="status-message"></p>
        <button id="btn-generate">Generate Bracket</button>
    </div>

    <div id="bracket-section">
        <h2>Hasil Bracket</h2>
        <div id="bracket-container"></div>
    </div>
    <script src="script/app.js"></script>
</body>
</html>
